<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Restaurante Lo de Luis</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#7a0000;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.top{
background:#eee;
padding:10px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:2fr 1fr 1fr;
height:90vh;
gap:10px;
padding:10px;
}

.panel{
background:white;
border-radius:10px;
padding:10px;
overflow:auto;
}

.mesas{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
}

.mesa{
padding:20px;
text-align:center;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:white;
}

.libre{
background:#2ecc71;
}

.abierta{
background:#f1c40f;
color:black;
}

.enviada{
background:#e74c3c;
}

.mesa.activa{
outline:4px solid #000;
}

button{
width:100%;
padding:6px;
margin-top:4px;
border:none;
background:#27ae60;
color:white;
border-radius:5px;
cursor:pointer;
}

.total{
font-size:22px;
font-weight:bold;
}

.admin{
display:none;
padding:20px;
}

.caja{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
Sistema Restaurante - Lo de Luis
</header>

<div class="top">

Mozo:

<select id="mozoNombre">
<option value="">Seleccionar</option>
<option>Yamila</option>
<option>Cielo</option>
<option>Carlos</option>
</select>

<button onclick="modoMozos()">Modo Mozos</button>
<button onclick="modoAdmin()">Administrador</button>

</div>

<div id="mozos">

<div class="container">

<div class="panel">

<h2>Mesas</h2>

<div class="mesas" id="mesas"></div>

</div>

<div class="panel">

<h2>Menú</h2>

<button onclick="add('Pizza Mozzarella',20000)">Pizza Mozzarella $20000</button>
<button onclick="add('Pizza Jamón y Morrón',24000)">Pizza Jamón y Morrón $24000</button>
<button onclick="add('Pizza Jamón',23000)">Pizza Jamón $23000</button>
<button onclick="add('Pizza Napolitana',23000)">Pizza Napolitana $23000</button>

<button onclick="add('Empanada Jamón y Queso',4000)">Empanada Jamón y Queso $4000</button>
<button onclick="add('Empanada Carne',4000)">Empanada Carne $4000</button>
<button onclick="add('Empanada Pollo',4000)">Empanada Pollo $4000</button>

<button onclick="add('Papas fritas',8000)">Papas fritas $8000</button>
<button onclick="add('Papas Cheddar',10000)">Papas Cheddar $10000</button>
<button onclick="add('Papas Cheddar Bacon',12500)">Papas Cheddar Bacon $12500</button>

<button onclick="add('Hamburguesa Carne',11500)">Hamburguesa Carne $11500</button>
<button onclick="add('Hamburguesa Completa',14500)">Hamburguesa Completa $14500</button>
<button onclick="add('Hamburguesa Pollo',10500)">Hamburguesa Pollo $10500</button>

<button onclick="add('Coca Cola',5000)">Coca Cola $5000</button>
<button onclick="add('Agua',3000)">Agua $3000</button>
<button onclick="add('Agua con gas',3000)">Agua con gas $3000</button>
<button onclick="add('Agua saborizada',4000)">Agua saborizada $4000</button>

<button onclick="add('Heineken',12000)">Heineken $12000</button>
<button onclick="add('Imperial',10000)">Imperial $10000</button>
<button onclick="add('Amstel',10000)">Amstel $10000</button>

<button onclick="add('Café',4000)">Café $4000</button>
<button onclick="add('Cortado',4000)">Cortado $4000</button>
<button onclick="add('Té',3000)">Té $3000</button>

<button onclick="add('Pastaflora Membrillo',4000)">Pastaflora Membrillo $4000</button>
<button onclick="add('Pastaflora Batata',4000)">Pastaflora Batata $4000</button>
<button onclick="add('Ricota',4000)">Ricota $4000</button>
<button onclick="add('Torta Chocolate',5000)">Torta Chocolate $5000</button>

<button onclick="add('Fernet',9000)">Fernet $9000</button>
<button onclick="add('Aperol',9000)">Aperol $9000</button>
<button onclick="add('Campari',9000)">Campari $9000</button>
<button onclick="add('Gancia',9000)">Gancia $9000</button>

</div>

<div class="panel">

<h2 id="mesaTitulo">Seleccionar Mesa</h2>

<ul id="lista"></ul>

<p class="total">
Total $<span id="total">0</span>
</p>

<button onclick="enviarComanda()">Enviar Comanda</button>

<button onclick="cerrarMesa()">Cerrar Mesa</button>

</div>

</div>

</div>

<div id="admin" class="admin">

<h2>Mesas abiertas</h2>
<div id="panelMesas"></div>

<h2>Historial</h2>
<div id="historial"></div>

<h2>Estadísticas</h2>
<div id="estadisticas"></div>

</div>

<script>

let mesas = JSON.parse(localStorage.getItem("mesas")) || {}
let historial = JSON.parse(localStorage.getItem("historial")) || []

let mesaActual=null

for(let i=1;i<=30;i++){

if(!mesas[i]){
mesas[i]={items:[],total:0,mozo:"",estado:"libre"}
}

let div=document.createElement("div")

div.className="mesa "+mesas[i].estado

actualizarMesaVisual(i,div)

div.onclick=()=>selectMesa(i,div)

document.getElementById("mesas").appendChild(div)

}

function actualizarMesaVisual(i,div){

let m=mesas[i]

div.className="mesa "+m.estado

if(m.mozo){
div.innerHTML="Mesa "+i+"<br><small>"+m.mozo+"</small>"
}else{
div.innerText="Mesa "+i
}

}

function selectMesa(n,el){

let mozo=document.getElementById("mozoNombre").value

if(!mesas[n].mozo){

if(mozo==""){
alert("Seleccionar mozo primero")
return
}

mesas[n].mozo=mozo
mesas[n].estado="abierta"

guardar()

actualizarMesas()

}

mesaActual=n

document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"))

el.classList.add("activa")

document.getElementById("mesaTitulo").innerText="Mesa "+n+" - Mozo: "+mesas[n].mozo

update()

}

function actualizarMesas(){

let lista=document.querySelectorAll(".mesa")

lista.forEach((div,index)=>{

let i=index+1

actualizarMesaVisual(i,div)

})

}

function add(nombre,precio){

if(!mesaActual)return

mesas[mesaActual].items.push({nombre,precio})

mesas[mesaActual].total+=precio

guardar()

update()

}

function update(){

let lista=document.getElementById("lista")

lista.innerHTML=""

mesas[mesaActual].items.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.nombre+" $"+p.precio

lista.appendChild(li)

})

document.getElementById("total").innerText=mesas[mesaActual].total

}

function cerrarMesa(){

let mesa=mesas[mesaActual]

if(mesa.total==0)return

historial.push({
mesa:mesaActual,
mozo:mesa.mozo,
items:mesa.items,
total:mesa.total,
hora:new Date().toLocaleTimeString()
})

mesas[mesaActual]={items:[],total:0,mozo:"",estado:"libre"}

guardar()

localStorage.setItem("historial",JSON.stringify(historial))

actualizarMesas()

update()

}

function guardar(){
localStorage.setItem("mesas",JSON.stringify(mesas))
}

function enviarComanda(){

let pedido=mesas[mesaActual]

pedido.estado="enviada"

guardar()

actualizarMesas()

let texto="COMANDA LO DE LUIS\n"

texto+="Mesa "+mesaActual+"\n"

texto+="Mozo: "+pedido.mozo+"\n\n"

pedido.items.forEach(p=>{
texto+=p.nombre+" $"+p.precio+"\n"
})

texto+="\nTOTAL $"+pedido.total

window.open("https://wa.me/5491159964173?text="+encodeURIComponent(texto))

}

function modoAdmin(){

document.getElementById("mozos").style.display="none"
document.getElementById("admin").style.display="block"

let panel=document.getElementById("panelMesas")
panel.innerHTML=""

for(let m in mesas){

let mesa=mesas[m]

if(mesa.total>0){

let div=document.createElement("div")
div.className="caja"

let html="<b>Mesa "+m+"</b><br>"
html+="Mozo: "+mesa.mozo+"<br>"

mesa.items.forEach(i=>{
html+=i.nombre+" $"+i.precio+"<br>"
})

html+="<b>Total $"+mesa.total+"</b>"

div.innerHTML=html

panel.appendChild(div)

}

}

mostrarHistorial()
estadisticas()

}

function mostrarHistorial(){

let hist=document.getElementById("historial")

hist.innerHTML=""

historial.forEach(h=>{

let div=document.createElement("div")

div.className="caja"

let html="<b>Mesa "+h.mesa+"</b><br>"
html+="Mozo: "+h.mozo+"<br>"

h.items.forEach(i=>{
html+=i.nombre+" $"+i.precio+"<br>"
})

html+="<b>Total $"+h.total+"</b><br>"+h.hora

div.innerHTML=html

hist.appendChild(div)

})

}

function estadisticas(){

let total=0
let mozos={}

historial.forEach(h=>{

total+=h.total

if(!mozos[h.mozo]){
mozos[h.mozo]=0
}

mozos[h.mozo]+=h.total

})

let html="Total del día $"+total+"<br><br>"

for(let m in mozos){
html+=m+" vendió $"+mozos[m]+"<br>"
}

document.getElementById("estadisticas").innerHTML=html

}

function modoMozos(){
document.getElementById("admin").style.display="none"
document.getElementById("mozos").style.display="block"
}

</script>

</body>
</html>
